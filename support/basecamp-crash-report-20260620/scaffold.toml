[scaffold]
version = "0.2.0"

[repos.lez]
source = "https://github.com/logos-blockchain/logos-execution-zone.git"
pin = "35d8df0d031315219f94d1546ceb862b0e5b208f"

[repos.spel]
source = "https://github.com/logos-co/spel.git"
pin = "1db7c5f8af3165318f9046c13ab185e24773fd59"

[repos.basecamp]
source = "https://github.com/logos-co/logos-basecamp.git"
pin = "a746cdbc521f72ee22c5a4856fd17a9802bb9d69"
build = "nix-flake"
attr = "app"

[repos.lgpm]
source = "github:logos-co/logos-package-manager"
pin = "e5c25989861f4487c3dc8c7b3bc0062bcbc3221f"
build = "nix-flake"
attr = "cli"

[modules.chat_module]
flake = "/home/agate/Projects/logos/logos-agent/.local/artifacts/basecamp-lgx/chat_module/chat_module.lgx"
role = "project"

[modules.delivery_module]
flake = "/home/agate/Projects/logos/logos-agent/.local/artifacts/basecamp-lgx/delivery_module/delivery_module.lgx"
role = "project"

[modules.logos_agent]
flake = "/home/agate/Projects/logos/logos-agent/.local/artifacts/basecamp-lgx/logos_agent/logos_agent.lgx"
role = "project"

[modules.logos_execution_zone]
flake = "/home/agate/Projects/logos/logos-agent/.local/artifacts/basecamp-lgx/logos_execution_zone/logos_execution_zone.lgx"
role = "project"

[modules.storage_module]
flake = "/home/agate/Projects/logos/logos-agent/.local/artifacts/basecamp-lgx/storage_module/storage_module.lgx"
role = "project"

[wallet]
home_dir = ".scaffold/wallet"

[framework]
kind = "default"
version = "0.1.0"

[framework.idl]
spec = "lssa-idl/0.1.0"
path = "idl"

[localnet]
port = 3040
risc0_dev_mode = true
